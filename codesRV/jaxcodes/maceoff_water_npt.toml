[structure]
#copy with cp ~/../../ptmp/kshao/mlip/codesRV/jaxcodes 
# Leave blank when using [structure.generate] — filename is derived from solute/solvent names.
path = ""

# Pure water box: self-solvation (resid 1 is the alchemical target).
# Box side = 2 * padding (A); the solvent count is derived from box volume
# and `density` (mace-md-style init). Residue name auto-resolves to HOH.
#
# We start at the experimental liquid-water density 0.997 g/cm³ so the
# Nose-Hoover barostat barely has to move the box. Starting far below
# equilibrium (e.g. density = 0.85) tends to overshoot into the steep
# MACE-OFF repulsive wall and the integrator goes unstable.
[structure.generate]
enabled = true
solvent_smiles = "O"
solute_smiles = "O"
density = 0.997
padding = 10.0          # A; box side = 2 * padding = 20 A; ~265 waters at rho=1.0
tolerance = 2.0
seed = 42

[simulation]
steps = 8000            # 4 ps with dt=0.5 fs
timestep = 0.5

# jax-md's deterministic Nose-Hoover NPT barostat (vs. nvt_mc_barostat
# elsewhere). Exercises the `with_perturbation` energy-fn wrapper on the
# nvalchemi backend (potentials.py rebuilds the periodic shifts so the
# box gradient flows). Slow barostat (tau ~ 5 ps) is required: tighter
# coupling causes volume overshoot at the dense liquid turning point and
# the system flash-vaporises.
[ensemble]
type = "npt"
temperature = 300.0
pressure = 1.0          # bar
barostat_tau = 5.0      # ps
thermostat_tau = 0.5    # ps

[potential]
type = "nn"

[potential.nn]
checkpoint_path = "mace_models/lambda_mace_v2_l1_128_ch_r6_nonsparse_stagetwo_new"
model_type = "mace_off"
r_cutoff = 6.0

# FIRE box-relaxation co-minimises positions and the simulation cell.
# `fire_dt_max = 0.02` (~2 fs internal time) keeps FIRE from overshooting
# the stiff O-H / H-bond modes; the default 0.1 oscillates badly on water.
[minimization]
method = "fire"
enabled = true
max_steps = 5000
force_tolerance = 0.1   # eV/Å
relax_box = true
fire_dt_max = 0.02

[output]
directory = "./run_water_npt"
log_interval = 50
trajectory_interval = 200